name: Deploy production

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest
          
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: 5.189.174.154
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "Conexión exitosa al VPS"

            IMAGE_NAME="ghcr.io/juanfelipe0215/despliegue-ci-cd:latest"
            CONTAINER_NAME="despliegue-ci-cd"

            echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u "juanfelipe0215" --password-stdin

            docker pull $IMAGE_NAME

            docker rm -f $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 8085:8080 \
              $IMAGE_NAME
